name: Deploy Kirokiro to Production

on:
  push:
    branches: [ main, production ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true
      - name: Run linters and type check
        run: |
          black --check .
          isort --check .
          flake8 .
          mypy kirokiro apps
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: kirokiro.settings
          SECRET_KEY: test-secret-for-ci-only
           DEBUG: "False"
           # SQLite is used here only for fast, isolated CI tests.
           # Production uses PostgreSQL (see .env.example and DEPLOYMENT.md)
           DATABASE_URL: sqlite:///:memory:
        run: |
          python manage.py check --deploy
          pytest --tb=short

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/kirokiro/kirokiro
            git fetch --all
            git checkout main
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput --clear
            python manage.py check --deploy
            sudo systemctl restart gunicorn
            sudo systemctl reload nginx
            echo "Deployment completed successfully at $(date)"

      - name: Notify (optional Slack/Discord)
        if: always()
        run: echo "Deploy job finished. Check server logs."
