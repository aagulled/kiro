# Production Nginx config for Kirokiro (modular)
# Copy kirokiro.conf to /etc/nginx/sites-available/kirokiro
# Copy snippets/ to /etc/nginx/snippets/
# Then: ln -s ... && nginx -t && systemctl reload nginx

upstream kirokiro_gunicorn {
    server unix:/run/gunicorn/kirokiro.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/snippets/secure-headers.conf;
    include /etc/nginx/snippets/gzip.conf;

    client_max_body_size 10M;

    location /static/ {
        alias /home/kirokiro/kirokiro/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /home/kirokiro/kirokiro/media/;
        expires 1M;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://kirokiro_gunicorn;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /health/ {
        proxy_pass http://kirokiro_gunicorn;
        access_log off;
    }
}
