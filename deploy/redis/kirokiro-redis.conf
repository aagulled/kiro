# Redis production config for Kirokiro (append or include)
# Recommended: /etc/redis/redis.conf customizations

# Security
requirepass your-strong-redis-password-here
protected-mode yes
bind 127.0.0.1 ::1

# Persistence (RDB + AOF for safety)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_8f3a9b2c"
rename-command DEBUG ""
